<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>테라로사 VOC 현황 대시보드</title>
    <!-- Chart.js 라이브러리 불러오기 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 전체 배경 및 폰트 설정 */
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary-blue: #2c3e50;
            --accent-blue: #3498db;
            --text-main: #333333;
        }

        body {
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        .dashboard-wrapper {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 상단 헤더 및 드롭다운 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h1 { margin: 0; font-size: 22px; color: var(--primary-blue); }
        
        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #dcdde1;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            background-color: #f8f9fa;
        }

        /* 상단 요약 수치 (KPI) 카드 섹션 */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .kpi-card {
            background: var(--card-bg);
            padding: 20px 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .kpi-title { font-size: 14px; color: #7f8c8d; margin-bottom: 10px; }
        .kpi-value { font-size: 26px; font-weight: bold; color: var(--primary-blue); }
        .kpi-sub { font-size: 12px; margin-top: 8px; }
        .down { color: #e74c3c; font-weight: bold; }

        /* 중간 및 하단 차트 섹션 */
        .middle-section {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .chart-card h3, .bottom-section h3 { 
            font-size: 16px; 
            margin-top: 0; 
            margin-bottom: 15px; 
            color: var(--primary-blue);
        }
        
        .chart-card h3 {
            border-left: 4px solid var(--accent-blue); 
            padding-left: 10px; 
        }

        .bottom-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 차트 크기를 고정하는 컨테이너 */
        .chart-wrapper {
            position: relative;
            width: 100%;
            height: 280px; 
        }
        
        .trend-wrapper {
            position: relative;
            width: 100%;
            height: 350px; 
        }

        /* =========================================
           📱 완벽한 모바일 반응형 코드
           ========================================= */
        @media (max-width: 992px) {
            .middle-section {
                grid-template-columns: repeat(2, 1fr);
            }
            .kpi-container {
                grid-template-columns: repeat(2, 1fr); 
            }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            
            .header {
                flex-direction: column; 
                gap: 15px;
                text-align: center;
                padding: 15px;
            }
            
            .header h1 { font-size: 18px; }
            .header select { width: 100%; }
            
            .kpi-container {
                grid-template-columns: repeat(2, 1fr); 
                gap: 10px;
            }
            .kpi-value { font-size: 20px; }

            .middle-section {
                grid-template-columns: 1fr; 
                gap: 15px;
            }

            .chart-wrapper { height: 260px; }
            .trend-wrapper { height: 300px; }
        }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <div class="header">
            <h1>☕ TERAROSA VOC Dashboard (2026)</h1>
            <select id="monthSelect">
                <option value="total">누적 현황 (1~5월)</option>
                <option value="jan">1월</option>
                <option value="feb">2월</option>
                <option value="mar">3월</option>
                <option value="apr">4월</option>
                <option value="may">5월</option>
            </select>
        </div>

        <div class="kpi-container">
            <div class="kpi-card">
                <div class="kpi-title">2026 Total VOC</div>
                <div class="kpi-value" id="totalVoc">6,658건</div>
                <div class="kpi-sub">전체 인입 기준</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">온라인 클레임</div>
                <div class="kpi-value" id="onlineClaim">121건</div>
                <div class="kpi-sub down">▼ -21.9% 감소</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">점포 클레임</div>
                <div class="kpi-value" id="storeClaim">45건</div>
                <div class="kpi-sub down">▼ -29.7% 감소</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-title">일일 평균</div>
                <div class="kpi-value" id="dayAvg">67.2건</div>
                <div class="kpi-sub">고객 건 수 기준</div>
            </div>
        </div>

        <div class="middle-section">
            <div class="chart-card">
                <h3>책임부서별 클레임 현황</h3>
                <div class="chart-wrapper">
                    <canvas id="deptChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>자사몰(판매처) 클레임 비중</h3>
                <div class="chart-wrapper">
                    <canvas id="mallPieChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>점포 클레임 비중</h3>
                <div class="chart-wrapper">
                    <canvas id="storePieChart"></canvas>
                </div>
            </div>
        </div>

        <div class="bottom-section">
            <h3>월별 클레임 및 점당 건수 추이</h3>
            <div class="trend-wrapper">
                <canvas id="trendChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const monthlyData = {
            total: { kpi: ["6,658건", "121건", "45건", "67.2건"], dept: [85, 37, 36, 8], mall: [50, 12, 24, 11, 2, 1], store: [18, 11, 13, 7, 7, 44] },
            jan: { kpi: ["1,382건", "25건", "12건", "44.5건"], dept: [15, 8, 7, 2], mall: [12, 3, 5, 2, 0, 0], store: [4, 2, 3, 1, 1, 8] },
            feb: { kpi: ["1,164건", "18건", "8건", "41.5건"], dept: [12, 5, 6, 1], mall: [9, 2, 4, 1, 1, 0], store: [3, 2, 2, 1, 1, 7] },
            mar: { kpi: ["1,194건", "20건", "15건", "38.5건"], dept: [18, 6, 8, 2], mall: [10, 3, 5, 2, 0, 0], store: [5, 3, 3, 2, 2, 10] },
            apr: { kpi: ["1,322건", "22건", "10건", "44.0건"], dept: [16, 7, 5, 1], mall: [8, 2, 4, 3, 0, 0], store: [3, 2, 2, 1, 1, 9] },
            may: { kpi: ["1,225건", "11건", "10건", "61.2건"], dept: [11, 10, 18, 5], mall: [36, 9, 17, 4, 18, 16], store: [20, 48, 36, 30, 20, 10] }
        };

        const commonOptions = { responsive: true, maintainAspectRatio: false };

        const deptCtx = document.getElementById('deptChart').getContext('2d');
        const deptChart = new Chart(deptCtx, { 
            type: 'bar', 
            data: { labels: ['생산물류', '구매전략', '영업팀', '이커머스'], datasets: [{ label: '클레임 건수', data: monthlyData.total.dept, backgroundColor: '#2c3e50', borderRadius: 4 }] }, 
            options: { ...commonOptions, indexAxis: 'y', plugins: { legend: { display: false } } } 
        });

        const pieOptions = {
            ...commonOptions,
            plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 } } } }
        };

        const mallCtx = document.getElementById('mallPieChart').getContext('2d');
        const mallChart = new Chart(mallCtx, { 
            type: 'doughnut', 
            data: { labels: ['오제공', '배송불만', '상품품질', '원두품질', '시스템', '이물질'], datasets: [{ data: monthlyData.total.mall, backgroundColor: ['#3498db', '#2980b9', '#1f618d', '#85c1e9', '#d4e6f1', '#154360'] }] }, 
            options: pieOptions 
        });

        const storeCtx = document.getElementById('storePieChart').getContext('2d');
        const storeChart = new Chart(storeCtx, { 
            type: 'pie', 
            data: { labels: ['오제공', '불친절', '대기불만', '음료이물', '응대미흡', '기타'], datasets: [{ data: monthlyData.total.store, backgroundColor: ['#e67e22', '#d35400', '#f39c12', '#f8c471', '#fdebd0', '#a04000'] }] }, 
            options: pieOptions 
        });

        const trendCtx = document.getElementById('trendChart').getContext('2d');
        const trendChart = new Chart(trendCtx, { 
            data: { 
                labels: ['1월', '2월', '3월', '4월', '5월'], 
                datasets: [
                    { type: 'line', label: '점당 건수(비율)', data: [0.20, 0.16, 0.45, 0.32, 0.32], borderColor: '#e74c3c', backgroundColor: '#e74c3c', yAxisID: 'y1', borderWidth: 2, tension: 0.3, pointRadius: 4 }, 
                    { type: 'bar', label: '이물질/클레임(건)', data: [45, 37, 35, 31, 21], backgroundColor: '#bdc3c7', yAxisID: 'y', borderRadius: 4 }
                ] 
            }, 
            options: { 
                ...commonOptions,
                plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } },
                scales: { 
                    y: { type: 'linear', position: 'left', title: { display: false }, beginAtZero: true }, 
                    y1: { type: 'linear', position: 'right', grid: { drawOnChartArea: false }, title: { display: false }, beginAtZero: true } 
                } 
            } 
        });

        document.getElementById('monthSelect').addEventListener('change', function(e) {
            const data = monthlyData[e.target.value];
            document.getElementById('totalVoc').innerText = data.kpi[0]; 
            document.getElementById('onlineClaim').innerText = data.kpi[1]; 
            document.getElementById('storeClaim').innerText = data.kpi[2]; 
            document.getElementById('dayAvg').innerText = data.kpi[3];
            
            deptChart.data.datasets[0].data = data.dept; 
            mallChart.data.datasets[0].data = data.mall; 
            storeChart.data.datasets[0].data = data.store;
            
            deptChart.update(); mallChart.update(); storeChart.update();
        });
    </script>
</body>
</html>
